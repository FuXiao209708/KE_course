<div class="qa-layout grid grid-cols-3 gap-6">
  <!-- 主对话框 -->
  <div class="qa-panel col-span-2 p-6 flex flex-col card">
    <div class="section-title mb-3">
      <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        <path d="M9 10h.01M12 10h.01M15 10h.01"/>
      </svg>
      智能问答
    </div>
    <div id="chat-window" class="qa-chat flex-1 overflow-auto space-y-4 p-3"></div>
    <div id="demo-questions" class="qa-demo-chips flex flex-wrap gap-2 mt-4 mb-3"></div>
    <div class="flex items-center gap-3">
      <div class="flex-1">
        <textarea id="qa-input" rows="2" class="w-full p-3 input-field" placeholder="输入问题，或从上方选择演示问题"></textarea>
      </div>
      <button id="qa-send" class="btn-primary">提问</button>
    </div>
  </div>

  <!-- 右侧辅助功能区（三段式等高布局） -->
  <div class="qa-panel col-span-1 qa-side">
    <!-- 板块 1：功能介绍 -->
    <div class="qa-side-card qa-side-intro">
      <div class="qa-side-title">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 5h10a3 3 0 0 1 3 3v12H7a3 3 0 0 0-3 3z"/><path d="M7 4h10a3 3 0 0 1 3 3v12h-9"/></svg>
        功能介绍
      </div>
      <div class="qa-side-scroll">
        <div class="qa-feature-list">
          <div class="qa-feature-item">
            <span class="qa-bullet">✓</span>
            <div>聚焦课程概念，提供<span class="qa-feature-highlight">核心知识答疑</span>，精准解析 RDF、OWL、描述逻辑等要点。</div>
          </div>
          <div class="qa-feature-item">
            <span class="qa-bullet qa-bullet-amber">✓</span>
            <div>基于学习画像生成<span class="qa-feature-highlight">学习路径规划</span>，动态推荐工程实践指导与复习节奏。</div>
          </div>
          <div class="qa-feature-item">
            <span class="qa-bullet">✓</span>
            <div>结合产业案例完成<span class="qa-feature-highlight">前沿技术拓宽</span>，理解工业界应用趋势与落地路径。</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 板块 2：知识图谱可视化 -->
    <div class="qa-side-card qa-side-graph">
      <div class="qa-side-title">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3l7 4v10l-7 4-7-4V7z"/></svg>
        知识图谱
      </div>
      <div id="graph" class="qa-graph-canvas"></div>
    </div>

    <!-- 板块 3：知识溯源 -->
    <div class="qa-side-card qa-side-source">
      <div class="qa-side-title">📝 知识溯源</div>
      <div id="source-card" class="source-card">
        <div id="source-chapter" class="source-chapter"></div>
        <div id="source-excerpt" class="source-excerpt"></div>
      </div>
    </div>
  </div>
</div>
