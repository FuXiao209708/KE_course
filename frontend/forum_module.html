
<!-- 发言规范 -->
<div class="card p-4 mb-6">
  <div class="flex items-start gap-3">
    <svg class="h-5 w-5 text-amber-600 flex-shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 9v4m0 4h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
    </svg>
    <div class="flex-1">
      <div class="font-semibold text-slate-900 mb-1">发言规范</div>
      <div class="text-sm text-slate-600 leading-relaxed">
        欢迎在论坛中交流学习心得、讨论课程问题、分享实践经验。请保持友善、尊重他人观点，避免发布与课程无关的内容。如有技术问题，建议先查阅课程资料或使用智能助手功能。
      </div>
    </div>
  </div>
</div>

<!-- 讨论列表 -->
<div class="card p-6 mb-6" style="max-height: 50vh; overflow-y: auto;">
  <div class="space-y-6" id="forum-posts">
    <!-- 讨论帖子将通过 JS 动态加载 -->
  </div>
</div>

<!-- 发言输入框 -->
<div class="card p-6">
  <div class="section-title mb-4">
    <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
    发表讨论
  </div>
  <textarea id="forum-input" class="w-full h-32 p-3 mb-3 input-field" placeholder="分享你的想法、问题或经验..."></textarea>
  <div class="flex items-center justify-between">
    <div class="flex gap-2">
      <button class="forum-tool-btn" type="button" title="插入图片">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
      </button>
      <button class="forum-tool-btn" type="button" title="插入链接">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
      </button>
      <button class="forum-tool-btn" type="button" title="插入代码">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/>
        </svg>
      </button>
    </div>
    <button id="forum-submit" class="btn-primary">发布</button>
  </div>
</div>
